<svg width="1000" height="260" viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="55%" stop-color="#111a2b"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ADD8"/>
      <stop offset="100%" stop-color="#7ee1f5"/>
    </linearGradient>
    <radialGradient id="glowField" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ADD8" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00ADD8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <style>
    @keyframes blink { 0%, 45% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @keyframes floatY { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
    @keyframes pulseSoft { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
    @keyframes lineGlow { 0%, 100% { opacity: 0.18; } 50% { opacity: 0.55; } }
    @keyframes hubPulse { 0%, 100% { r: 4; opacity: 0.8; } 50% { r: 7; opacity: 0.35; } }
    @keyframes fieldSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .cursor { animation: blink 1.1s step-end infinite; }
    .icon-float { animation: floatY 3.6s ease-in-out infinite; }
    .d0 { animation-delay: 0s; }
    .d1 { animation-delay: .5s; }
    .d2 { animation-delay: 1s; }
    .d3 { animation-delay: 1.5s; }
    .d4 { animation-delay: 2s; }
    .d5 { animation-delay: 2.5s; }
    .conn-line { animation: lineGlow 3.2s ease-in-out infinite; }
    .l0 { animation-delay: 0s; }
    .l1 { animation-delay: .4s; }
    .l2 { animation-delay: .8s; }
    .l3 { animation-delay: 1.2s; }
    .l4 { animation-delay: 1.6s; }
    .l5 { animation-delay: 2s; }
    .hub-dot { animation: hubPulse 2.4s ease-in-out infinite; transform-origin: center; }
    .glow-field { animation: fieldSpin 40s linear infinite; transform-origin: 860px 128px; }
  </style>

  <rect width="1000" height="260" fill="url(#bg)"/>

  <!-- subtle static background dots -->
  <g opacity="0.16" fill="#00ADD8">
    <circle cx="60" cy="36" r="1.6"/>
    <circle cx="150" cy="210" r="1.6"/>
    <circle cx="480" cy="24" r="1.4"/>
    <circle cx="520" cy="236" r="1.4"/>
  </g>

  <!-- ============ LEFT: identity ============ -->
  <text x="60" y="96" font-family="'Segoe UI', 'Fira Code', monospace" font-size="42" font-weight="700" fill="#f0f6fc">
    Sulthan Adam Rahmadi
  </text>

  <rect x="60" y="118" width="0" height="4" rx="2" fill="url(#accent)">
    <animate attributeName="width" values="0;300;300;0" keyTimes="0;0.35;0.85;1" dur="4.5s" begin="0.2s" repeatCount="indefinite"/>
  </rect>

  <g font-family="'Fira Code', monospace" font-size="20">
    <text x="60" y="158" fill="#00ADD8">&gt;</text>
    <text x="86" y="158" fill="#c9d1d9">Backend &amp; Microservice Engineer</text>
    <rect class="cursor" x="454" y="143" width="10" height="20" fill="#00ADD8"/>
  </g>

  <text x="60" y="192" font-family="'Segoe UI', sans-serif" font-size="15" fill="#8b949e">
    Teknik Informatika · UIN Maulana Malik Ibrahim Malang
  </text>

  <!-- ============ RIGHT: tech constellation ============ -->
  <g>
    <circle cx="860" cy="128" r="110" fill="url(#glowField)" class="glow-field"/>

    <!-- hexagon connecting lines between the 6 nodes -->
    <g stroke="#00ADD8" stroke-width="1.2" fill="none">
      <line class="conn-line l0" x1="860" y1="40"  x2="936" y2="84"  opacity="0.3"/>
      <line class="conn-line l1" x1="936" y1="84"  x2="936" y2="172" opacity="0.3"/>
      <line class="conn-line l2" x1="936" y1="172" x2="860" y2="216" opacity="0.3"/>
      <line class="conn-line l3" x1="860" y1="216" x2="784" y2="172" opacity="0.3"/>
      <line class="conn-line l4" x1="784" y1="172" x2="784" y2="84"  opacity="0.3"/>
      <line class="conn-line l5" x1="784" y1="84"  x2="860" y2="40"  opacity="0.3"/>
    </g>
    <!-- spokes to hub -->
    <g stroke="#7ee1f5" stroke-width="1" fill="none" opacity="0.22">
      <line x1="860" y1="128" x2="860" y2="40"/>
      <line x1="860" y1="128" x2="936" y2="84"/>
      <line x1="860" y1="128" x2="936" y2="172"/>
      <line x1="860" y1="128" x2="860" y2="216"/>
      <line x1="860" y1="128" x2="784" y2="172"/>
      <line x1="860" y1="128" x2="784" y2="84"/>
    </g>

    <circle class="hub-dot" cx="860" cy="128" r="4" fill="#7ee1f5"/>

